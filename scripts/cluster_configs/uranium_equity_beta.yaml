# Uranium equity beta — do the listed uranium miners trade as one factor, and what is it?
# The FOURTH commodity cohort (after copper, gold, lithium) and the cleanest test of the family:
# uranium has BOTH a miner ETF (URNM/URA) AND a financialized physical proxy (SRUUF, the Sprott
# Physical Uranium Trust), so unlike lithium the miners-vs-metal decomposition is available again.
# Regime test: uranium has been in a sustained bull (spot ~$30 in 2021 to ~$100+/lb), so the
# regime law predicts a TIGHT cohort like gold, not loose like lithium's noisy rebound.
# Distinct from [[Nuclear renaissance]] — that cohort is the reactors/SMR/utilities; these are the
# fuel producers. Six liquid names: CCJ (Cameco, the producer bellwether), UEC, DNN, NXE
# (developers), UUUU (Energy Fuels, diversified with rare earths — likely satellite), URG (small).
name: Uranium equity beta
primary: CCJ
prefix: uranium-equity-beta-cluster
threshold: 0.5
window_end: 2026-06-12
definition_date: 2026-06-15
groups:
