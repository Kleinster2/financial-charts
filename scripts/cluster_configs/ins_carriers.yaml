name: Insurance carriers
primary: PGR
prefix: ins-carriers-cluster
threshold: 0.4
window_end: 2026-04-30

groups:
  cluster:
    color: "#2962FF"
    tickers: [PGR, CB, TRV, ALL, MET, PRU, AIG, HIG]
  ins_brokers:
    color: "#7E57C2"
    tickers: [WTW, AJG, AON, BRO, MMC]
  banks:
    color: "#FF6F00"
    tickers: [JPM, BAC, WFC]
  etf:
    color: "#9E9E9E"
    tickers: [XLF, SPY]
