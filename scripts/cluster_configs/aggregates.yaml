# Construction aggregates — the Vulcan / Martin Marietta duopoly (crushed stone, sand,
# gravel; local-monopoly economics, infrastructure + construction demand). Distinct
# construction-materials factor, or = the materials ETF XLB? Only VMC/MLM are DB-ready
# (EXP/SUM/CRH not ingested), so a pair test like cable. A priori: likely VALIDATED
# distinct — XLB is chemicals/industrial-gas-dominated (LIN/APD/SHW/ECL/FCX), so the
# aggregates names sit inside it but it tracks a different factor (the index-rule escape,
# like cable vs XLC). Controls: XLB (materials ETF — the key benchmark), XHB (homebuilders
# / residential-construction demand), XLI (industrials), SPY.
name: Construction aggregates
primary: VMC
prefix: aggregates-cluster
threshold: 0.5
window_end: 2026-06-22
definition_date: 2026-06-23
history_start: 2019-01-01

groups:
  cluster:
    tickers: [VMC, MLM]
  materials_etf:
    tickers: [XLB]
  homebuilders:
    tickers: [XHB]
  industrials:
    tickers: [XLI]
  market:
    tickers: [SPY]
