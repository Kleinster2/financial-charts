# Lithium equity beta — do the listed lithium miners trade as one factor, and what is it?
# The third commodity cohort after copper and gold, with a key structural difference: lithium
# has NO investable spot instrument (no GLD/CPER equivalent), so the "miners vs the metal" test
# is unavailable — the equity complex (and the LIT ETF) IS the only investable lithium exposure.
# The regime test: lithium crashed ~80% in 2023-24 then rebounded (+58% YoY to Jan 2026); does a
# strong directional move tighten the cohort the way gold's bull did (magnitude not direction)?
# Four liquid US-listed names: ALB (high-leverage producer), SQM (diversified producer, looser),
# LAC (Thacker Pass developer, pre-revenue), SGML (Sigma, Brazil producer). PLL excluded
# (Piedmont merged into Elevra Lithium, 2025, delisted); LAAC unavailable from the data source.
name: Lithium equity beta
primary: ALB
prefix: lithium-equity-beta-cluster
threshold: 0.5
window_end: 2026-06-12
definition_date: 2026-06-14
groups:
  cluster:
    color: "#2962FF"
    tickers: [ALB, SQM, LAC, SGML]
  lithium_etf:
    color: "#26A69A"
    tickers: [LIT]
  materials:
