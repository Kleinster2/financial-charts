# Coal miners — the commodity-beta-map gap (copper/gold/silver/lithium/uranium/steel/
# rare-earth done; coal open). No coal ETF exists (KOL liquidated 2020), so this tests
# whether coal is a distinct NO-ETF factor (like tankers) or = XLE/XME — and whether it
# splits met-coal (steel/coking) vs thermal-coal (power). Candidate: met coal AMR/HCC/METC,
# thermal ARLP, diversified BTU/CNR (Core Natural Resources, the 2025 Arch+CONSOL merger).
# Controls: steel NUE (met-coal demand link), nat-gas UNG (thermal competitor), metals/mining
# XME, energy XLE, SPY. Tickers ingested 2026-06-24 (ARCH/CEIX delisted into CNR).
name: Coal miners
primary: BTU
prefix: coal-cluster
threshold: 0.5
window_end: 2026-06-22
definition_date: 2026-06-24
history_start: 2019-01-01

groups:
  cluster:
    tickers: [BTU, AMR, HCC, ARLP, METC, CNR]
  steel:
    tickers: [NUE]
  nat_gas:
    tickers: [UNG]
  metals_mining:
    tickers: [XME]
  energy:
    tickers: [XLE]
  market:
    tickers: [SPY]
