# Silver equity beta — do the listed silver miners trade as one factor, and is it distinct from gold miners?
# The commodity-beta family's silver entry (after copper, gold, lithium, uranium, steel, rare-earth royalties).
# Silver is a hybrid — ~50% industrial demand (solar/electronics) on top of its precious-metal/monetary role —
# and silver miners are notoriously HIGH-beta to gold. So three outcomes are live: (1) = SLV (silver-price
# beta, like the gold miners = gold); (2) = GDX (one precious-metals-miner complex — silver miners are just
# levered gold miners); (3) a distinct silver-miner factor. The GDX control is the key discriminator (distinct
# from gold miners?), and SLV is the metal (are the equities the silver price?). Five primary silver miners:
# PAAS (Pan American, the largest), HL (Hecla, US), CDE (Coeur), FSM (Fortuna), AG (First Majestic, the
# "silver" pure-play). SIL is the global silver-miners ETF. ("AG" quoted defensively after the ON->True gotcha.)
name: Silver equity beta
primary: PAAS
prefix: silver-equity-beta-cluster
