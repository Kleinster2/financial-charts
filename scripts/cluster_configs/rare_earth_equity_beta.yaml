# Rare earth equity beta — do the listed rare-earth / critical-mineral miners trade as one factor, and what is it?
# The SIXTH commodity cohort (after copper, gold, lithium, uranium, steel & aluminum) and the most
# extreme "no investable metal" case in the family: rare earths have NO spot instrument and NO futures —
# pricing is opaque and China-controlled — so unlike uranium (SRUUF physical trust) there is no
# miners-vs-metal decomposition AT ALL. The equity complex plus the diluted REMX strategic-metals ETF
# is the ONLY rare-earth exposure that exists. Even more extreme than lithium (which at least has a
# spot reference). So the test reduces to: do the names cohere, and are they distinct from REMX?
# Regime: rare earths went vertical in 2025-26 on China's Apr-2025 export controls on heavy REE +
# magnets and the Jul-2025 US DoD price-floor/equity deal with MP Materials, so the regime law predicts
# a TIGHT shared-shock cohort — IF the names share that geopolitical driver rather than splitting by
# commodity/stage. Heterogeneous by design (the real test): MP (US light-REE producer + magnets, the
# bellwether, DoD-backed), LYC.AX (Lynas, the largest ex-China producer; ASX-native -> async close,
# weekly cross-check corrects it), USAR (USA Rare Earth, heavy-REE + magnets, 2025 de-SPAC), UUUU
# (Energy Fuels, uranium + monazite REE -- ALSO in the uranium cohort, likely satellite), NB (NioCorp,
# niobium/scandium + byproduct REE developer), CRML (Critical Metals, Greenland REE + Austria lithium
# developer, extreme ~170% vol). Excluded: REEMF (OTC penny stock, 14% non-trading days), TMC (deep-sea
# base metals, off-thesis). USAR/CRML are 2024-25 listings, so the 2y holdout is history-limited.
name: Rare earth equity beta
primary: MP
prefix: rare-earth-equity-beta-cluster
threshold: 0.5
window_end: 2026-06-18
definition_date: 2026-06-20
history_start: 2020-01-01
groups:
  cluster:
    color: "#2962FF"
    tickers: [MP, LYC.AX, USAR, UUUU, NB, CRML]
  strategic_metals_etf:
    color: "#26A69A"
    tickers: [REMX]
  mining:
    color: "#7E57C2"
    tickers: [XME]
  etf:
    color: "#9E9E9E"
    tickers: [SPY]
