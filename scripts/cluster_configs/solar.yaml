# Solar — the listed US solar names. The cohort spans two halves with genuinely
# different dominant drivers, which is the test:
#   - First Solar (FSLR) — utility-scale thin-film panels; policy/tariff-driven (IRA
#     manufacturing credits, China/SE-Asia ADCVD tariffs, domestic-content rules)
#   - Nextracker (NXT) — utility-scale solar trackers; policy/utility-capex-driven
#   - Enphase (ENPH) — residential microinverters; rate-sensitive demand
#   - SolarEdge (SEDG) — residential inverters/optimizers; rate-sensitive demand
#   - Sunrun (RUN) — residential installer/lease; the most rate-sensitive (financing)
# Hypothesis: a likely split — utility-scale (FSLR/NXT, tariff/policy driver) vs
# residential (ENPH/SEDG/RUN, interest-rate driver) — the value-chain-split law on
# clean energy, where the two halves have DIFFERENT dominant drivers (tariffs vs rates).
# Or one rate/policy-sensitive clean-energy factor. All US-listed (synchronous).
# Controls (each a distinctness question):
#   - solar_etf (TAN): the solar ETF — ETF-replicability test (the cohort is most of TAN).
#   - clean_energy (ICLN): broad clean energy — distinct from the wider green-energy trade?
#   - etf (SPY): broad market.
name: Solar
primary: FSLR
prefix: solar-cluster
threshold: 0.5
window_end: 2026-06-12
definition_date: 2026-06-14

groups:
  cluster:
    color: "#2962FF"
    tickers: [FSLR, ENPH, SEDG, RUN, NXT]
  solar_etf:
    color: "#F4511E"
    tickers: [TAN]
  clean_energy:
    color: "#7E57C2"
    tickers: [ICLN]
  etf:
    color: "#9E9E9E"
    tickers: [SPY]
